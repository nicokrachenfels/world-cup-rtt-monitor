name: RTT Arbitrage Monitor

on:
  schedule:
    # Every 15 minutes (requires public repo for unlimited free minutes)
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  monitor:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: state.json
          key: rtt-state-v1
          restore-keys: rtt-state-v1

      - name: Run RTT monitor
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          FIFA_EMAIL: ${{ secrets.FIFA_EMAIL }}
          FIFA_PASSWORD: ${{ secrets.FIFA_PASSWORD }}
        run: python monitor.py

      - name: Save monitor state
        uses: actions/cache@v4
        if: always()  # Save state even if the monitor step fails
        with:
          path: state.json
          key: rtt-state-v1
