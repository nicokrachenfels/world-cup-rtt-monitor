name: RTT Arbitrage Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: state.json
          key: rtt-state-v1-${{ github.run_number }}
          restore-keys: rtt-state-v1-

      - name: Run RTT monitor
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          FIFA_EMAIL: ${{ secrets.FIFA_EMAIL }}
          FIFA_PASSWORD: ${{ secrets.FIFA_PASSWORD }}
        run: python monitor.py

      - name: Save monitor state
        uses: actions/cache@v4
        if: always()  # Save state even if the monitor step fails
        with:
          path: state.json
          key: rtt-state-v1-${{ github.run_number }}

      - name: Generate dashboard
        env:
          FIFA_EMAIL: ${{ secrets.FIFA_EMAIL }}
          FIFA_PASSWORD: ${{ secrets.FIFA_PASSWORD }}
        run: python analyze.py --no-open

      - name: Prepare Pages artifact
        run: mkdir -p _site && cp dashboard.html _site/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          single-commit: true
          commit-message: "Update dashboard [${{ github.run_number }}]"
